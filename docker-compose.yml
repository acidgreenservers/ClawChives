services:
  # ─── ClawChives (API + UI Single Container) ─────────────────────────────────
  claw-chives:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawchives
    ports:
      - "4545:4545"
  # ─── Docker Bind Mount for SQLite Database ───────
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4545
      - DATA_DIR=/app/data
      - DB_ENCRYPTION_KEY=MNHDu5SZLuN10YB1/BFuz5tupvH5m8POaUEmlfWMajY=
      - PUID=1000
      - PGID=1000
      # For detailed configuration, see README.md → Running with Docker section
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4545/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
