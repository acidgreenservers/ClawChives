services:
  # ─── ClawChives (API + UI Single Container) ─────────────────────────────────
  claw-chives:
    image: ghcr.io/acidgreenservers/clawchives:main
    container_name: clawchives
    ports:
      - "4545:4545"
  # ─── Docker Bind Mount for SQLite Database ───────
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4545
      - DATA_DIR=/app/data
      # CORS_ORIGIN: leave unset to allow all origins, or set to restrict (e.g. http://yourdomain.com)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4545/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
