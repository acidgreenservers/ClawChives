version: '3.8'

services:
  # ─── Frontend (Vite + React) ───────────────────────────────────────────────
  claw-chives:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawchives-ui
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:4242
    depends_on:
      claw-chives-api:
        condition: service_healthy



  # ─── API Server (Express + SQLite) ────────────────────────────────────────
  claw-chives-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: clawchives-api
    ports:
      - "4242:4242"
    volumes:
      - sqlite_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4242
      - DATA_DIR=/app/data
      - CORS_ORIGIN=http://localhost:5173
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4242/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  sqlite_data:
    driver: local
