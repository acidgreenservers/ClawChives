services:
  # ─── ClawChives (API + UI Single Container) ─────────────────────────────────
  claw-chives:
    image: ghcr.io/acidgreenservers/clawchives:main
    container_name: clawchives
    ports:
      - "4545:4545"
  # ─── Docker Bind Mount for SQLite Database ───────
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4545
      - DATA_DIR=/app/data
      # CORS_ORIGIN restricts which origins can access the API. Set this to your deployment origin.
      # Examples: http://192.168.1.5:4545  |  https://bookmarks.yourdomain.com
      # NEVER leave unset in production — defaults to allow-all if omitted.
      - CORS_ORIGIN=http://localhost:4545
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4545/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
