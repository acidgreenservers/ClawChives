# nginx Configuration for ClawChives (HTTPS with SSL Termination)
# ════════════════════════════════════════════════════════════════════════════
#
# Purpose: Reverse proxy with SSL termination for ClawChives
# Location: /etc/nginx/sites-available/clawchives
# Dependencies: nginx, certbot (for Let's Encrypt)
#
# Installation:
#   1. sudo nano /etc/nginx/sites-available/clawchives
#   2. Paste this content (update server_name)
#   3. sudo ln -s /etc/nginx/sites-available/clawchives /etc/nginx/sites-enabled/
#   4. sudo nginx -t
#   5. sudo systemctl reload nginx
#   6. sudo certbot --nginx -d your-domain.com
#
# ════════════════════════════════════════════════════════════════════════════

# ──────────────────────────────────────────────────────────────────────────────
# HTTP → HTTPS Redirect (Port 80)
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name clawchives.yoursite.com;  # ← CHANGE THIS

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────────────────────────────────────
# HTTPS with SSL Termination (Port 443)
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clawchives.yoursite.com;  # ← CHANGE THIS

    # ──────────────────────────────────────────────────────────────────────────
    # SSL Certificate (Let's Encrypt - certbot will add these)
    # ──────────────────────────────────────────────────────────────────────────

    ssl_certificate /etc/letsencrypt/live/clawchives.yoursite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clawchives.yoursite.com/privkey.pem;

    # ──────────────────────────────────────────────────────────────────────────
    # SSL Configuration (Mozilla Modern - TLS 1.3 only)
    # ──────────────────────────────────────────────────────────────────────────

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL session cache (performance)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling (certificate validation)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/clawchives.yoursite.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ──────────────────────────────────────────────────────────────────────────
    # Security Headers
    # ──────────────────────────────────────────────────────────────────────────

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────────────────────────────────────────
    # Reverse Proxy to ClawChives API
    # ──────────────────────────────────────────────────────────────────────────

    location / {
        # Forward to ClawChives backend (localhost:4242)
        proxy_pass http://localhost:4242;

        # Preserve original request headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # Access and Error Logs
    # ──────────────────────────────────────────────────────────────────────────

    access_log /var/log/nginx/clawchives_access.log;
    error_log /var/log/nginx/clawchives_error.log;
}

