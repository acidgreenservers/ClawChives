<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="proxyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="proxyShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Proxy server box -->
  <rect x="4" y="6" width="16" height="12" rx="3" fill="url(#proxyGradient)" filter="url(#proxyShadow)"/>
  
  <!-- Server details -->
  <rect x="6" y="8" width="12" height="2" rx="1" fill="white" opacity="0.8"/>
  <rect x="6" y="11" width="12" height="2" rx="1" fill="white" opacity="0.6"/>
  <rect x="6" y="14" width="12" height="2" rx="1" fill="white" opacity="0.4"/>
  
  <!-- Network connection lines -->
  <path d="M2 4L6 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M22 4L18 6" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M2 20L6 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M22 20L18 18" stroke="white" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Connection dots -->
  <circle cx="2" cy="4" r="1.5" fill="#3b82f6"/>
  <circle cx="22" cy="4" r="1.5" fill="#3b82f6"/>
  <circle cx="2" cy="20" r="1.5" fill="#3b82f6"/>
  <circle cx="22" cy="20" r="1.5" fill="#3b82f6"/>
  
  <!-- Signal waves -->
  <path d="M12 2C12 2 16 4 16 6" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M12 22C12 22 16 20 16 18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M12 2C12 2 8 4 8 6" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M12 22C12 22 8 20 8 18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Status indicator -->
  <circle cx="20" cy="8" r="2" fill="#10b981" stroke="white" stroke-width="1"/>
</svg>
