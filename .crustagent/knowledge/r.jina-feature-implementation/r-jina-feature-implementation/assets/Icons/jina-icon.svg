<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="jinaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#06b6d4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main circle with gradient -->
  <circle cx="12" cy="12" r="10" fill="url(#jinaGradient)" filter="url(#shadow)"/>
  
  <!-- Lobster claw design -->
  <path d="M8 8C8 6 10 4 12 4C14 4 16 6 16 8C16 10 14 12 12 12C10 12 8 10 8 8Z" 
        fill="white" stroke="#06b6d4" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- AI circuit pattern -->
  <path d="M6 16L10 14L14 16L18 14" 
        stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M6 18L10 16L14 18L18 16" 
        stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <path d="M6 20L10 18L14 20L18 18" 
        stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  
  <!-- Central AI dot -->
  <circle cx="12" cy="8" r="2" fill="#3b82f6" stroke="white" stroke-width="1"/>
  
  <!-- Subtle glow effect -->
  <circle cx="12" cy="12" r="10" stroke="url(#jinaGradient)" stroke-width="2" fill="none" opacity="0.3"/>
</svg>
