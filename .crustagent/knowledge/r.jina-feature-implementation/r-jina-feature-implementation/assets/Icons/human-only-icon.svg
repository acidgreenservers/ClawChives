<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="humanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="humanShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#f59e0b" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Human silhouette -->
  <path d="M12 2C8.13401 2 5 5.13401 5 9C5 12.5 8 15.5 8 15.5C8 15.5 8 17 9 18C10 19 12 19 12 19C12 19 14 19 15 18C16 17 16 15.5 16 15.5C16 15.5 19 12.5 19 9C19 5.13401 15.866 2 12 2Z" 
        fill="url(#humanGradient)" filter="url(#humanShadow)"/>
  
  <!-- Human-only badge -->
  <rect x="14" y="4" width="8" height="4" rx="2" fill="white" stroke="#f59e0b" stroke-width="1"/>
  <text x="18" y="7" font-family="Arial, sans-serif" font-size="2.5" font-weight="bold" fill="#f59e0b" text-anchor="middle">HUMAN</text>
  
  <!-- Lock symbol to indicate restricted access -->
  <path d="M9 12H15V16H9V12Z" fill="white" opacity="0.8"/>
  <path d="M12 12V16" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12" cy="14" r="1" fill="#f59e0b"/>
  
  <!-- Warning border -->
  <circle cx="12" cy="12" r="10" stroke="url(#humanGradient)" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Hand gesture -->
  <path d="M8 15L6 17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M16 15L18 17" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
